<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Spirit of Toronto Game</title>

<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #game-container {
    position: relative;
    width: 1376px;
    height: 768px;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }

  #ui {
    position: absolute;
    z-index: 10;
    color: white;
    font-family: Arial;
    padding: 10px;
  }
</style>
</head>

<body>

<div id="game-container">
  <canvas id="game" width="1376" height="768"></canvas>
  <div id="ui">Loading Spirit of Toronto...</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ui = document.getElementById("ui");

// ===== LOAD BACKGROUND =====
const background = new Image();
background.src = "/assets/background.png"; 
// ⚠️ MAKE SURE THIS PATH IS CORRECT

let backgroundLoaded = false;

background.onload = () => {
  backgroundLoaded = true;
  ui.innerText = "Game Ready";
  loop();
};

background.onerror = () => {
  ui.innerText = "ERROR: Background not found (check file path)";
  console.error("Background failed to load");
};

// ===== PLAYER =====
const player = {
  x: 200,
  y: 500,
  w: 50,
  h: 50,
  speed: 5
};

const playerImg = new Image();
playerImg.src = "https://via.placeholder.com/50";

// ===== INPUT =====
const keys = {};

window.addEventListener("keydown", (e) => keys[e.key] = true);
window.addEventListener("keyup", (e) => keys[e.key] = false);

// ===== UPDATE =====
function update() {
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;
  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;
}

// ===== DRAW =====
function draw() {
  if (!backgroundLoaded) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // background
  ctx.drawImage(background, 0, 0, canvas.width, canvas.height);

  // overlay
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // player
  ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

  // debug text
  ctx.fillStyle = "white";
  ctx.font = "16px Arial";
  ctx.fillText("Arrow keys to move", 20, 30);
}

// ===== LOOP =====
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
